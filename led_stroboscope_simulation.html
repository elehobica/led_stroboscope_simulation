<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Stroboscope Principle</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root{
    --color-text-primary:#1a1a1a;
    --color-text-secondary:#555;
    --color-background-primary:#ffffff;
    --color-background-secondary:#ffffff;
    --color-background-info:#e6f1fb;
    --color-background-success:#e1f5ee;
    --color-background-warning:#faeeda;
    --color-background-danger:#fcebeb;
    --color-text-info:#185fa5;
    --color-text-success:#0f6e56;
    --color-text-warning:#854f0b;
    --color-text-danger:#a32d2d;
    --border-radius-md:6px;
    --border-radius-lg:10px;
  }
  html,body{margin:0;padding:0;background:#f4f3ee;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}
  button{font-family:inherit;font-size:13px;padding:6px 12px;border:1px solid #c9c7be;
    background:#fff;border-radius:6px;cursor:pointer;color:#1a1a1a;}
  button:hover{background:#f0efe9;}
  button[aria-pressed="true"]{background:#e8e6dd;border-color:#9a988e;}
</style>
</head>
<body>
<h2 class="sr-only">Animation of an LED stroboscope with five scenes.</h2>
<div id="strobeRoot" style="display:flex; flex-direction:column; gap:8px; box-sizing:border-box; padding:8px;">
  <div id="canvasWrap" style="display:flex; align-items:center; justify-content:center; min-height:0; min-width:0; overflow:hidden;">
    <canvas id="strobeCanvas" width="660" height="450" style="display:block; max-width:100%; max-height:100%; width:auto; height:auto; border-radius:var(--border-radius-lg); background:var(--color-background-secondary);"></canvas>
  </div>

  <!-- Scene buttons are generated by strobe_core.js from the scenes config -->
  <div id="rowScenes" style="flex:0 0 auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap;"></div>

  <div id="rowDesc" style="flex:0 0 auto; display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; align-items:center; gap:10px;">
      <span id="sceneLabel" style="font-size:15px; font-weight:500; color:var(--color-text-primary);">Scene 2 — Strobe flashing</span>
      <span id="sceneStatus" style="font-size:13px; padding:3px 10px; border-radius:var(--border-radius-md);">—</span>
    </div>
    <p id="sceneDesc" style="margin:0; font-size:14px; line-height:1.6; color:var(--color-text-secondary);"></p>
  </div>

  <div id="rowControls" style="flex:0 0 auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
    <button id="playBtn" style="display:inline-flex; align-items:center; gap:6px;"><i class="ti ti-player-play" aria-hidden="true"></i><span id="playLabel">Play</span></button>
    <button id="stepBtn" style="display:inline-flex; align-items:center; gap:6px;"><i class="ti ti-player-track-next" aria-hidden="true"></i>&gt; |</button>
    <button id="resetBtn" style="display:inline-flex; align-items:center; gap:6px;"><i class="ti ti-player-skip-back" aria-hidden="true"></i>Reset</button>
    <span id="frameInfo" style="font-size:13px; color:var(--color-text-secondary); font-variant-numeric:tabular-nums;">frame 0</span>
    <button id="trailBtn" style="display:inline-flex; align-items:center; gap:6px; margin-left:auto;"><i class="ti ti-ghost" aria-hidden="true"></i><span id="trailLabel">Afterimage: ON</span></button>
  </div>
</div>

<script>
// LED stroboscope: the LEDs glow at their lit color and the board stays dark — both use
// 'source-over' so each region converges to its color (the LED saturates at green and does
// NOT keep brightening toward white, unlike additive 'lighter'). The green afterimage trail
// comes from the decay between flashes. Only this config differs from the traditional page —
// the program (strobe_core.js) is shared.
window.STROBE_CONFIG = {
  // --- Geometry (pattern radial position & width) ---
  markInner: 0.85,              // pattern inner radius (fraction of discR)
  markOuter: 0.90,              // pattern outer radius (fraction of discR)
  markDuty: 0.2,                // pattern angular width as a fraction of one slot
  showStrobeLight: false,       // LEDs self-emit; no external strobe lamp

  // --- Afterimage ON (light-accumulation model) ---
  patternOp: 'source-over',     // composite op for the pattern region while lit
  patternColor: '#55ee55',      // pattern color in normal scenes (lightBand:false)
  patternColorAlt: '#55ee55',   // pattern color only in scenes with lightBand:true (Scene 5)
  patternAlpha: 0.75,           // pattern blend per frame (0..1)
  gapOp: 'source-over',         // composite op for the non-pattern region while lit
  gapColor: '#000000',          // non-pattern (background) fill color
  gapAlpha: 0.00,               // non-pattern blend per frame (0..1)
  initColor: '#000000',         // disc fill before any flash
  decayColor: '#000000',        // afterimage fades toward this between flashes
  decayAlpha: 0.005,          // afterimage fade per frame (0..1); lower = longer-lasting

  // --- Afterimage OFF (instantaneous) ---
  discLit: '#000000',           // disc surface while lit
  discDark: '#000000',          // disc surface while dark
  markLit: '#33cf33',           // pattern while lit
  markGhost: '#33cf33',         // all marks shown while lit; set = markLit to light every one
  markOff: '#0c2e0c',           // pattern while dark

  // --- Scenes (this page's scene list; edit independently of the traditional page) ---
  scenes: [
    {
      flashOnFrames: 16, speedFactor: 1.0, marks: 24, markStep: 4, lightBand: true,
      label: 'Scene 1 — Continuous light',
      status: 'Rotating', statusColor: 'info', motion: 'Blurred motion', motionColor: 'info',
      desc: 'The light stays on continuously. The marks blur into motion and the rotation is clearly visible.',
      arrow: null
    },
    {
      flashOnFrames: 2, speedFactor: 1.0, marks: 24, markStep: 4, lightBand: false,
      label: 'Scene 2 — Strobe flashing (speed matches)',
      status: 'Stays still', statusColor: 'success', motion: 'Stays still', motionColor: 'success',
      desc: 'The light flashes at a fixed frequency. Each flash advances the disc by a whole number of slots, so every mark is lit in the same place and the pattern stays still.',
      arrow: 'still'
    },
    {
      flashOnFrames: 2, speedFactor: 0.975, marks: 24, markStep: 4, lightBand: false,
      label: 'Scene 3 — Rotation slightly slow',
      status: 'Slow backward drift', statusColor: 'danger', motion: 'Drifts backward', motionColor: 'danger',
      desc: 'The rotation is slightly slower than the matching speed, so each flash catches the marks a little behind and the pattern drifts slowly backward.',
      arrow: 'ccw'
    },
    {
      flashOnFrames: 2, speedFactor: 1.025, marks: 24, markStep: 4, lightBand: false,
      label: 'Scene 4 — Rotation slightly fast',
      status: 'Slow forward drift', statusColor: 'warning', motion: 'Drifts forward', motionColor: 'warning',
      desc: 'The rotation is slightly faster than the matching speed, so each flash catches the marks a little ahead and the pattern drifts slowly forward.',
      arrow: 'cw'
    }
  ]
};
</script>
<script src="strobe_core.js"></script>

</body>
</html>
