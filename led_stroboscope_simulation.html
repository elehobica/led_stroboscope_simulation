<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Stroboscope Principle</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root{
    --color-text-primary:#1a1a1a;
    --color-text-secondary:#555;
    --color-background-primary:#ffffff;
    --color-background-secondary:#ffffff;
    --color-background-info:#e6f1fb;
    --color-background-success:#e1f5ee;
    --color-background-warning:#faeeda;
    --color-background-danger:#fcebeb;
    --color-text-info:#185fa5;
    --color-text-success:#0f6e56;
    --color-text-warning:#854f0b;
    --color-text-danger:#a32d2d;
    --border-radius-md:6px;
    --border-radius-lg:10px;
  }
  html,body{margin:0;padding:0;background:#f4f3ee;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}
  button{font-family:inherit;font-size:13px;padding:6px 12px;border:1px solid #c9c7be;
    background:#fff;border-radius:6px;cursor:pointer;color:#1a1a1a;}
  button:hover{background:#f0efe9;}
  button[aria-pressed="true"]{background:#e8e6dd;border-color:#9a988e;}
</style>
</head>
<body>
<h2 class="sr-only">Animation of an LED stroboscope with five scenes.</h2>
<div id="strobeRoot" style="display:flex; flex-direction:column; gap:8px; box-sizing:border-box; padding:8px;">
  <div id="canvasWrap" style="display:flex; align-items:center; justify-content:center; min-height:0; min-width:0; overflow:hidden;">
    <canvas id="strobeCanvas" width="660" height="450" style="display:block; max-width:100%; max-height:100%; width:auto; height:auto; border-radius:var(--border-radius-lg); background:var(--color-background-secondary);"></canvas>
  </div>

  <div id="rowScenes" style="flex:0 0 auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
    <button id="scene1Btn" class="sceneBtn">Scene 1</button>
    <button id="scene2Btn" class="sceneBtn">Scene 2</button>
    <button id="scene3Btn" class="sceneBtn">Scene 3</button>
    <button id="scene4Btn" class="sceneBtn">Scene 4</button>
    <button id="scene5Btn" class="sceneBtn">Scene 5</button>
  </div>

  <div id="rowDesc" style="flex:0 0 auto; display:flex; flex-direction:column; gap:6px;">
    <div style="display:flex; align-items:center; gap:10px;">
      <span id="sceneLabel" style="font-size:15px; font-weight:500; color:var(--color-text-primary);">Scene 2 — Strobe flashing</span>
      <span id="sceneStatus" style="font-size:13px; padding:3px 10px; border-radius:var(--border-radius-md);">—</span>
    </div>
    <p id="sceneDesc" style="margin:0; font-size:14px; line-height:1.6; color:var(--color-text-secondary);"></p>
  </div>

  <div id="rowControls" style="flex:0 0 auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
    <button id="playBtn" style="display:inline-flex; align-items:center; gap:6px;"><i class="ti ti-player-play" aria-hidden="true"></i><span id="playLabel">Play</span></button>
    <button id="stepBtn" style="display:inline-flex; align-items:center; gap:6px;"><i class="ti ti-player-track-next" aria-hidden="true"></i>&gt; |</button>
    <button id="resetBtn" style="display:inline-flex; align-items:center; gap:6px;"><i class="ti ti-player-skip-back" aria-hidden="true"></i>Reset</button>
    <span id="frameInfo" style="font-size:13px; color:var(--color-text-secondary); font-variant-numeric:tabular-nums;">frame 0</span>
    <button id="trailBtn" style="display:inline-flex; align-items:center; gap:6px; margin-left:auto;"><i class="ti ti-ghost" aria-hidden="true"></i><span id="trailLabel">Afterimage: ON</span></button>
  </div>
</div>

<script>
// LED stroboscope: the LEDs themselves emit light (pattern = 'lighter'); the board
// between them stays dark (gap = 'source-over'). Only this config differs from the
// traditional (printed-pattern) page — the program (strobe_core.js) is shared.
window.STROBE_CONFIG = {
  // --- Geometry: LEDs are a short radial segment near the rim ---
  markInner: 0.80,
  markOuter: 0.90,
  markDuty: 0.4,

  // --- Afterimage ON (light-accumulation model) ---
  // Light ON  : board -> black (gap, source-over), LED -> dark green (pattern, lighter)
  // Light OFF : everything fades to black (decayColor)
  patternOp: 'lighter',         // LEDs emit -> accumulate toward their color
  patternColor: '#1e7a1e',      // LED while lit (afterimage ON): dark green
  patternColorAlt: '#1e7a1e',
  patternAlphaPerS: 45,
  gapOp: 'source-over',         // board between LEDs -> pulled toward dark
  gapColor: '#888888',          // board: black
  gapAlphaPerS: 30,
  initColor: '#000000',         // disc starts black
  decayColor: '#000000',        // afterimage fades to fully black
  decayAlphaPerS: 0.02,          // afterimage fade speed (lower = longer-lasting)

  // --- Afterimage OFF (instantaneous) ---
  // Light ON  : board black, LED green        Light OFF : board black, LED very dark green
  discLit: '#000000',           // board while lit
  discDark: '#000000',          // board while dark
  markLit: '#33cf33',           // LED while lit: green
  markGhost: '#33cf33',         // all LEDs light up green when lit (not just the swept band)
  markOff: '#0c2e0c'            // LED while off: very dark green
};
</script>
<script src="strobe_core.js"></script>

</body>
</html>
